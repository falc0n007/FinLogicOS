name: Bug Report
description: Report a bug or unexpected behavior in FinLogicOS.
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide the exact steps needed to reproduce the behavior.
      placeholder: |
        1. Run command '...'
        2. Provide input '...'
        3. Observe output '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages or stack traces.
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node.js Version
      description: Output of `node --version`
      placeholder: "e.g. v20.11.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: Your OS and version.
      placeholder: "e.g. macOS 14.3, Ubuntu 22.04, Windows 11"
    validations:
      required: true
