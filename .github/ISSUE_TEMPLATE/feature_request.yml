name: Feature Request
description: Propose a new feature or improvement for FinLogicOS.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: Describe the problem or limitation you are facing. What is missing or not working well for your use case?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or change you would like to see. Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative approaches or workarounds you have already considered.
    validations:
      required: false
